<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Generate thoughtful, role-specific interview questions for any job title."
    />
    <title>RolePrep AI — Interview Questions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true">RP</span>
        <span class="logo-text">RolePrep AI</span>
      </div>
      <p class="tagline">Interview prep, tailored to the role</p>
    </header>

    <main class="container">
      <section class="hero" aria-labelledby="hero-heading">
        <h1 id="hero-heading">Three questions that actually matter</h1>
        <p class="hero-sub">
          Enter a job title and get thoughtful, role-specific interview questions
          powered by Gemini.
        </p>
      </section>

      <form id="question-form" class="card form-card" novalidate>
        <label for="job-title">Job title</label>
        <div class="input-row">
          <input
            type="text"
            id="job-title"
            name="jobTitle"
            placeholder="e.g. Senior Backend Engineer"
            autocomplete="organization-title"
            required
            maxlength="120"
          />
          <button type="submit" id="submit-btn">
            <span class="btn-label">Generate</span>
            <span class="btn-spinner" hidden aria-hidden="true"></span>
          </button>
        </div>
        <div class="form-meta">
          <p id="form-hint" class="form-hint">Press Enter or click Generate</p>
          <span id="char-count" class="char-count" aria-live="polite">0 / 120</span>
        </div>
      </form>

      <section
        id="results"
        class="card results-card"
        hidden
        aria-live="polite"
        aria-atomic="true"
      >
        <div class="results-header">
          <h2 id="results-title">Interview questions</h2>
          <p id="results-role" class="results-role"></p>
        </div>
        <ol id="questions-list" class="questions-list"></ol>
        <button type="button" id="try-again" class="text-btn">Try another role</button>
      </section>

      <div
        id="error-banner"
        class="error-banner"
        role="alert"
        aria-labelledby="error-title"
        tabindex="-1"
        hidden
      >
        <div class="error-icon" aria-hidden="true">!</div>
        <div class="error-body">
          <p id="error-title" class="error-title"></p>
          <p id="error-message" class="error-message"></p>
          <p id="error-hint" class="error-hint" hidden></p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>Built with Flask &amp; Gemini</p>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
