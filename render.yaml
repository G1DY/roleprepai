services:
  - type: web
    name: roleprepai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_ENABLE_FALLBACK
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
